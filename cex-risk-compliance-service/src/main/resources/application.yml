spring:
  profiles:
    active: dev
  application:
    name: cex-risk-compliance-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_CONFIG_ENABLED:false}
    sentinel:
      enabled: ${SENTINEL_ENABLED:false}
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

server:
  port: 18085

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"

risk:
  monitor:
    interval-ms: 1000
    liquidation-consecutive-hits: 2
    conditional-consecutive-hits: 1
    liquidation-fee-buffer-rate: 0.001
    kafka:
      enabled: false
      topic: risk.triggers

server:
  port: 8087

spring:
  application:
    name: cex-market-data-service
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      # record 模式降低批量提交引发的重复消费窗口。
      ack-mode: record
      # 多并发消费者提升吞吐，需与分区数匹配。
      concurrency: 3
    consumer:
      auto-offset-reset: latest
      max-poll-records: 500
      fetch-min-size: 1
      properties:
        spring.json.trusted.packages: com.aicex.marketdata.domain

management:
  endpoints:
    web:
      exposure:
        # 暴露关键观测指标，便于高可用运维。
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

market:
  ingest:
    kafka:
      enabled: true
      topic: market.events
      group-id: market-data-service
spring:
  profiles:
    active: dev
  application:
    name: cex-market-data-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_CONFIG_ENABLED:false}
    sentinel:
      enabled: ${SENTINEL_ENABLED:false}
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

server:
  port: 18089

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"

spring:
  profiles:
    active: dev
  application:
    name: cex-trading-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      ack-mode: record
    consumer:
      auto-offset-reset: latest
      properties:
        spring.json.trusted.packages: com.aicex.trading.domain
        spring.json.value.default.type: com.aicex.trading.domain.RiskTriggerEvent
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_CONFIG_ENABLED:false}
    sentinel:
      enabled: ${SENTINEL_ENABLED:false}
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

server:
  port: 18084

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"

trading:
  risk-trigger:
    kafka:
      enabled: false
      topic: risk.triggers
      group-id: trading-risk-trigger
    execution:
      idempotency-window-seconds: 600
